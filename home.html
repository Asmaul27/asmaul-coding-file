  .notification{

    top: 150px;

    font-weight: bold;

box-shadow: 0 4px 10px rgba(0,0,0,0.3);

    from{
        opacity:0;
        transform:translateX(100px);
    }
    to{
        opacity:1;
        transform:translateX(0);

  @media (max-width: 768px) {

.container{
    width:95%;

}

    width:100%;
    box-sizing:border-box;

input[type="text"],

button{
    width:auto;

.postBtn{
    width:100%;
  display:block;
min-width:100% !important;
  }
.post{
    width:100%;
    box-sizing:border-box;
}

    .post img{
    max-width:100%;
    height:auto;
    }
    .post img.profilePic{
    width:50px !important;
    height:50px !important;
    max-width:50px !important;
    border-radius:50%;
    object-fit:cover;
    
}

  }
  .profile{
    display:flex;

}

.profile div{

    justify-content:center;
}
}
}
}
    }

<body>

</div>
<div class="header">
Daasu Social

style="float:right;cursor:pointer;">
🔔 <span id="bellCount">0</span>
</span>
</div>

color:#00ff88;
font-size:16px;
margin:5px 0 15px 0;">

<div class="container">
<input type="file" id="profilePhoto" accept="image/*">

<textarea id="postText" placeholder="What's on your mind?"></textarea>

<input
    type="text"
    id="searchInput"

<script type="module">

getAuth,

  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-storage.js";

const firebaseConfig = {

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const storage = getStorage(app);

  let like = 0;

window.addPost = async function(){

let text = document.getElementById("postText").value;
let photo = document.getElementById("photo").files[0];



if(text=="" && !photo){
alert("Write something or choose a photo!");
return;
}
await addDoc(collection(db, "posts"), {
    text: text,
    time: new Date().toISOString()
});
let profilePic = localStorage.getItem("profilePic") || "default.png";
  let post = `
<div class="post">
<div class="profile">
<img src="${profilePic}" width="50" height="50" class="profilePic">
<div>
<h3>Daasu Khan</h3>
`;

  let now = new Date();
let time = now.toLocaleString();
post += "<small style='color:#bbb;display:block;margin-bottom:8px;'>" + time + "</small>";
  post += "</div></div>";
if(text!=""){
post += "<p>"+text+"</p>";
}
if (photo) {
    let img = URL.createObjectURL(photo);
    post += "<img src='" + img + "'>";
}
post += `
<br><br>

<button onclick="likePost(this)">❤️ Like <span>0</span></button>
<button onclick="editPost(this)">✏️ Edit</button>
<button onclick="deletePost(this)">🗑 Delete</button>
<button onclick="sharePost(this)">📤 Share</button>
<button onclick="sendFriendRequest(this)">👥 Add Friend</button>
<button onclick="openChat(this)">💬 Message</button>
<br><br>

<div class="comments"></div>

<input type="text" class="commentInput" placeholder="Write a comment...">

<button onclick="addComment(this)">Comment</button>
<button onclick="replyPost(this)">↩️ Reply</button>
 
`;

post += "</div>";

document.getElementById("posts").innerHTML =
post + document.getElementById("posts").innerHTML;

document.getElementById("postText").value="";
document.getElementById("photo").value="";
  //localStorage.setItem("posts",
//document.getElementById("posts").innerHTML);
  showNotification("✅ New Post Added!");
}
 window.changeProfile = function() {
    let file = document.getElementById("profilePhoto").files[0];

    if (!file) {
        alert("Please choose a profile picture!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e) {
        localStorage.setItem("profilePic", e.target.result);

        document.querySelectorAll(".profilePic").forEach(function(img) {
            img.src = e.target.result;
        });

        alert("Profile picture updated!");
    };

    reader.readAsDataURL(file);
  }
window.likePost = function(button){
    let count = button.querySelector("span");

    if(button.classList.contains("liked")){
        button.classList.remove("liked");
        button.style.background = "#00c853";
        count.innerText = Number(count.innerText) - 1;
    }else{
        button.classList.add("liked");
        button.style.background = "#ff2d55";
        count.innerText = Number(count.innerText) + 1;
    }

    localStorage.setItem(
        "posts",
        document.getElementById("posts").innerHTML
    );
}

window.deletePost = function(button){

    if(!confirm("Are you sure you want to delete this post?")){
        return;
    }

    let post = button.closest(".post");
    post.remove();

    localStorage.setItem(
        "posts",
        document.getElementById("posts").innerHTML
    );

    showNotification("🗑️ Post Deleted!");
}
window.editPost = function(button){
    let post = button.parentElement;
    let text = post.querySelector("p");

    if(!text){
        alert("No text to edit!");
        return;
    }

    let newText = prompt("Edit your post:", text.innerText);

    if(newText !== null && newText.trim() !== ""){
        text.innerText = newText;
    }
}

window.addComment = function(button){
    let post = button.parentElement;

    let input = post.querySelector(".commentInput");
    let comments = post.querySelector(".comments");

    if(input.value.trim() == "") return;

    comments.innerHTML += "<p><b>Daasu Khan:</b> " + input.value + "</p>";

    input.value = "";
  }
  window.sharePost = function(button){
    let post = button.closest(".post");
    let text = post.innerText;

    if (navigator.share) {
        navigator.share({
            title: "Daasu Social",
            text: text
        });
    } else {
        navigator.clipboard.writeText(text);
        alert("✅ Post copied! Now paste it anywhere.");
    }
  }
window.replyPost = function(button){

    let post = button.parentElement;

    let reply = prompt("Write your reply:");

    if(reply === null || reply.trim() === ""){
        return;
    }

    let comments = post.querySelector(".comments");

    comments.innerHTML +=
    "<p style='margin-left:20px;color:#00ff88;'><b>↩️ Reply:</b> " +
    reply +
    "</p>";
  localStorage.setItem(
    "posts",
    document.getElementById("posts").innerHTML
);

showNotification("↩ Reply Added!");
}
  
window.sendFriendRequest = function(button){
    button.outerHTML = `
    <button onclick="acceptFriend(this)">✅ Accept</button>
    <button onclick="rejectFriend(this)">❌ Reject</button>
    `;
    showNotification("👥 New Friend Request!");
}

  window.acceptFriend = function(button){
    let count = Number(localStorage.getItem("friendCount") || 0);
    count++;
    localStorage.setItem("friendCount", count);

    document.getElementById("friendCount").innerHTML =
    "👥 Friends: " + count;

    let rejectBtn = button.nextElementSibling;
    rejectBtn.remove();

  button.outerHTML = `<button onclick="unfriend(this)">🤝 Friends</button>`;

    showNotification("✅ Friend Request Accepted!");
  }
window.unfriend = function(button){
    let count = Number(localStorage.getItem("friendCount") || 0);

    if(count > 0){
        count--;
    }

    localStorage.setItem("friendCount", count);

    document.getElementById("friendCount").innerHTML =
    "👥 Friends: " + count;

    button.outerHTML = `<button onclick="sendFriendRequest(this)">👥 Add Friend</button>`;

    showNotification("❌ Unfriended!");
}
window.rejectFriend = function(button){
    let acceptBtn = button.previousElementSibling;

    acceptBtn.outerHTML = `<button onclick="sendFriendRequest(this)">👥 Add Friend</button>`;

    button.remove();

    showNotification("❌ Friend Request Rejected!");
}
  window.updateStatus = function() {
    let status = document.getElementById("status");

    if (navigator.onLine) {
        status.innerHTML = "🟢 Online • Active Now";
        status.style.color = "#00ff88";
    } else {
        status.innerHTML = "🔴 Offline";
        status.style.color = "red";
    }
}

window.addEventListener("online", updateStatus);
window.addEventListener("offline", updateStatus);
  
  window.openChat = function(button){
    document.getElementById("chatBox").style.display = "block";
}

window.closeChat = function(){
    document.getElementById("chatBox").style.display = "none";
}

window.sendChat = function(){

    let input = document.getElementById("chatInput");
    let msg = input.value.trim();

    if(msg=="") return;

    let box = document.getElementById("chatMessages");

    box.innerHTML +=
    "<p><b>You:</b> " + msg + "</p>";

    input.value="";

    box.scrollTop = box.scrollHeight;
}

  window.onload = async function(){
  const querySnapshot = await getDocs(collection(db, "posts"));

querySnapshot.forEach((doc) => {

    let data = doc.data();

let profilePic = localStorage.getItem("profilePic") || "default.png";

let post = `
<div class="post">

<div class="profile">
<img src="${profilePic}" width="50" height="50" class="profilePic">

<div>
<h3>Daasu Khan</h3>

<small style="color:#bbb;">
${new Date(data.time).toLocaleString()}
</small>

</div>
</div>

<p>${data.text}</p>

<small style="color:#bbb;">
${new Date(data.time).toLocaleString()}
</small>

<br><br>

<button onclick="likePost(this)">❤️ Like <span>0</span></button>
<button onclick="deletePost(this)">🗑 Delete</button>
<button onclick="sharePost(this)">📤 Share</button>
<button onclick="sendFriendRequest(this)">👥 Add Friend</button>
<button onclick="openChat(this)">💬 Message</button>
<div class="comments"></div>

<input type="text" class="commentInput" placeholder="Write a comment...">

<button onclick="addComment(this)">Comment</button>

</div>
`;
if (data.image) {
    post = post.replace(
        "</p>",
        `</p><img src="${data.image}">`
    );
}
    document.getElementById("posts").innerHTML += post;

});
    //let savedPosts = localStorage.getItem("posts");

    //if(savedPosts){
        //document.getElementById("posts").innerHTML = savedPosts;
   // }
  let count = Number(localStorage.getItem("friendCount") || 0);
document.getElementById("friendCount").innerText =
"👥 Friends: " + count;
  updateStatus();
  setInterval(updateStatus, 1000);
  }
  window.searchPosts = function() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let posts = document.getElementsByClassName("post");

    for (let i = 0; i < posts.length; i++) {
        let text = posts[i].innerText.toLowerCase();

        if (text.includes(input)) {
            posts[i].style.display = "block";
        } else {
            posts[i].style.display = "none";
        }
    }
  }
  window.showNotification = function(message) {
    let box = document.getElementById("notification");

    box.innerHTML = "" + message;
    box.style.display = "block";

    setTimeout(function () {
        box.style.display = "none";
    }, 3000);
    addBellNotification();
  }
  
  let notificationCount = 0;

window.addBellNotification = function() {
    notificationCount++;
    document.getElementById("bellCount").innerText = notificationCount;
}
window.showAllNotifications = function() {
    alert("🔔 Total Notifications: " + notificationCount);
}
 </script>
