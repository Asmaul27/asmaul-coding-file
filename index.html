<!DOCTYPE html>

<title>Daasu Social - Login</title>

<style>
body{
  background:#1e1e2f;
  font-family:Arial;
  text-align:center;
  color:white;
  padding-top:50px;
}

input{
  width:250px;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

button{
  width:270px;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-size:18px;
}

h1{
  color:#00c853;
}
</style>



<h1>Daasu Social</h1>

<p>Login to your account</p>

<input id="email" type="text" placeholder="Email">
<br>

<input id="password" type="password" placeholder="Password">
<br>

<button onclick="login()">Login</button>

<button onclick="window.location.href='signup.html'">
Create New Account
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjZndV-2MBNeRPs-BCkS02zoLOsbnF02c",
  authDomain: "daasu-social-2071e.firebaseapp.com",
  projectId: "daasu-social-2071e",
  storageBucket: "daasu-social-2071e.firebasestorage.app",
  messagingSenderId: "358998583979",
  appId: "1:358998583979:web:1d89872e107a9b5277e5ee"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email=="" || password==""){
alert("Fill all fields!");
return;
}

signInWithEmailAndPassword(auth, email, password)
.then((userCredential)=>{

alert("Login Successful!");
window.location.href="home.html";

})
.catch((error)=>{
alert(error.message);
});

}

</script>
</body>
</html>
