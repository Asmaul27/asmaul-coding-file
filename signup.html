<!DOCTYPE html>

<title>Create Account</title>
<style>
body{
  background:#1e1e2f;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:50px;
}
input,button{
  width:260px;
  padding:12px;
  margin:10px;
  border-radius:8px;
  border:none;
}
button{
  background:#00c853;
  color:white;
}
</style>
<h1>Create Account</h1>

<input type="text" id="name" placeholder="Full Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">
Create Account
</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjZndV-2MBNeRPs-BCkS02zoLOsbnF02c",
  authDomain: "daasu-social-2071e.firebaseapp.com",
  projectId: "daasu-social-2071e",
  storageBucket: "daasu-social-2071e.firebasestorage.app",
  messagingSenderId: "358998583979",
  appId: "1:358998583979:web:1d89872e107a9b5277e5ee"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.signup = function () {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(name=="" || email=="" || password==""){
    alert("Fill all fields!");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential)=>{
      alert("Account Created Successfully!");
      window.location.href="index.html";
    })
    .catch((error)=>{
      alert(error.message);
    });

}

</script>
</body>
</html>
